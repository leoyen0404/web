<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* 基礎排版：左邊編輯器，右邊預覽 */
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #333;
        }
        #editor-container, #preview-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        #preview-container {
            background-color: #f9f9f9;
            border-left: 1px solid #ddd;
        }
        .header {
            padding: 10px 20px;
            background: #eee;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        #editor {
            flex: 1;
            padding: 20px;
            border: none;
            resize: none;
            font-family: "Courier New", Courier, monospace;
            font-size: 16px;
            line-height: 1.5;
            outline: none;
        }
        #preview {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            line-height: 1.6;
        }
        /* 簡單的 Markdown 元素樣式 */
        #preview img { max-width: 100%; }
        #preview blockquote { border-left: 4px solid #ccc; margin: 0; padding-left: 16px; color: #666; }
        #preview code { background: #eee; padding: 2px 4px; border-radius: 4px; }
        #preview pre code { display: block; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>

    <div id="editor-container">
        <div class="header">Markdown 編輯器</div>
        <textarea id="editor" placeholder="正在載入..."></textarea>
    </div>

    <div id="preview-container">
        <div class="header">
            <span>預覽畫面</span>
            <span id="status" style="font-size: 12px; color: #666; font-weight: normal;"></span>
        </div>
        <div id="preview"></div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const statusText = document.getElementById('status');

        // 1. 核心渲染功能：將 Markdown 轉成 HTML 並顯示
        function updatePreview(text) {
            preview.innerHTML = marked.parse(text);
        }

        // 2. 監聽編輯器輸入：即時更新預覽，並自動存入 localStorage
        editor.addEventListener('input', (e) => {
            const currentText = e.target.value;
            updatePreview(currentText);
            localStorage.setItem('md_cache', currentText);
            statusText.textContent = '已自動儲存至本機';
        });

        // 3. 讀取快取 (Fallback) 邏輯
        function loadFromCache(errorMessage = '') {
            const cachedText = localStorage.getItem('md_cache');
            if (cachedText) {
                editor.value = cachedText;
                updatePreview(cachedText);
                statusText.textContent = errorMessage ? `${errorMessage} (已載入上次編輯紀錄)` : '已載入本機快取';
            } else {
                // 如果連快取都沒有，給予預設提示
                const defaultMsg = "# 歡迎使用 Markdown Viewer\n\n- 在網址後方加上 `?demo.md` 來載入同層資料夾的檔案。\n- 或者在左側直接開始打字。";
                editor.value = defaultMsg;
                updatePreview(defaultMsg);
                statusText.textContent = '新文件';
            }
        }

        // 4. 網頁載入時的初始化邏輯 (解析 URL)
        window.addEventListener('DOMContentLoaded', () => {
            const searchParam = window.location.search;

            // 判斷 URL 是否有帶參數 (例如 ?demo.md)
            if (searchParam && searchParam.startsWith('?')) {
                // 支援 ?url=xxx.md 或直接 ?xxx.md
                const params = new URLSearchParams(searchParam);
                let fetchUrl = params.get('url');
                
                if (!fetchUrl) {
                    // 如果沒有 'url='，就把 '?' 後面的一整串當作檔案路徑
                    fetchUrl = decodeURIComponent(searchParam.substring(1));
                }

                statusText.textContent = `正在載入: ${fetchUrl}...`;

                // 執行網路請求抓取檔案
                fetch(fetchUrl)
                    .then(response => {
                        if (!response.ok) throw new Error(`找不到檔案 (${response.status})`);
                        return response.text();
                    })
                    .then(markdownText => {
                        // 成功抓到檔案，填入編輯器與預覽
                        editor.value = markdownText;
                        updatePreview(markdownText);
                        
                        // 將抓到的內容寫入快取，這樣重整時如果不帶參數也會出現這份文件
                        localStorage.setItem('md_cache', markdownText);
                        statusText.textContent = '載入成功';
                    })
                    .catch(err => {
                        console.error('Fetch 失敗:', err);
                        // 如果抓不到指定的網址，就退回去讀取上次的紀錄
                        loadFromCache(`讀取 ${fetchUrl} 失敗`);
                    });

            } else {
                // 如果 URL 沒有帶任何參數，直接讀取快取
                loadFromCache();
            }
        });
    </script>
</body>
</html>
