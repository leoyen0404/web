<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocab Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Animations */
        .fade-in { animation: fadeIn 0.3s ease-out; }
        .slide-in-right { animation: slideInRight 0.3s ease-out; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .touch-pan-y { touch-action: pan-y; }
        
        /* Loading Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans overflow-hidden selection:bg-indigo-100 selection:text-indigo-900">

    <div id="app" class="flex h-screen w-full relative">
        <div class="flex flex-col items-center justify-center w-full h-full text-slate-400">
            <div class="loader mb-4"></div>
            <p class="text-sm font-medium">Loading vocabulary...</p>
        </div>
    </div>

    <script>
        // --- APP STATE ---
        const state = {
            vocabData: [],
            units: [],
            learnedWords: new Set(),
            viewMode: 'grid', 
            searchQuery: '',
            selectedUnit: 'All',
            selectedWordId: null,
            isMobileMenuOpen: false,
            savedScrollPos: 0,
            isLoading: true
        };

        // --- DATA INITIALIZATION ---
        async function initData() {
            try {
                const response = await fetch('vocab.json');
                const data = await response.json();
                
                const flatData = [];
                let idCounter = 1;

                data.units.forEach(unit => {
                    // Process Vocabulary Preview
                    if (unit.vocabulary_preview) {
                        unit.vocabulary_preview.forEach(item => {
                            flatData.push({
                                id: idCounter++,
                                word: item.word,
                                pos: item.pos,
                                def: item.definition,
                                unit: unit.title,
                                category: 'Vocabulary Preview'
                            });
                        });
                    }
                    // Process NAWL
                    if (unit.nawl) {
                        unit.nawl.forEach(item => {
                            flatData.push({
                                id: idCounter++,
                                word: item.word,
                                pos: item.pos,
                                def: item.definition,
                                unit: unit.title,
                                category: 'NAWL'
                            });
                        });
                    }
                });

                state.vocabData = flatData;
                state.units = ['All', ...new Set(flatData.map(w => w.unit))];
                state.isLoading = false;

                // Load saved progress
                const savedProgress = localStorage.getItem('vocabLearned_json_v1');
                if (savedProgress) {
                    state.learnedWords = new Set(JSON.parse(savedProgress));
                }

                render();
            } catch (error) {
                console.error("Failed to load vocab.json:", error);
                document.getElementById('app').innerHTML = `
                    <div class="flex flex-col items-center justify-center w-full h-full text-slate-500 p-8 text-center">
                        <i data-lucide="alert-circle" class="text-red-500 mb-4 w-12 h-12"></i>
                        <h2 class="text-xl font-bold mb-2">Data Load Failed</h2>
                        <p class="text-sm max-w-xs">Make sure <strong>vocab.json</strong> is in the same directory as this file.</p>
                        <button onclick="location.reload()" class="mt-6 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium">Retry</button>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        function saveProgress() {
            localStorage.setItem('vocabLearned_json_v1', JSON.stringify(Array.from(state.learnedWords)));
        }

        // --- SVG ICONS HELPERS ---
        const svgCheckCircle = (size = 24, classes = "") => `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${classes}"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>`;
        const svgCircle = (size = 24, classes = "") => `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${classes}"><circle cx="12" cy="12" r="10"/></svg>`;

        // --- RENDER HELPERS ---
        function getPosBadge(pos) {
            const colors = {
                noun: "bg-blue-50 text-blue-700 border-blue-200",
                verb: "bg-emerald-50 text-emerald-700 border-emerald-200",
                adjective: "bg-purple-50 text-purple-700 border-purple-200",
                adverb: "bg-amber-50 text-amber-700 border-amber-200",
            };
            const colorClass = colors[pos?.toLowerCase()] || "bg-slate-50 text-slate-700 border-slate-200";
            return `<span class="px-2 py-0.5 text-xs font-medium rounded-md border inline-block ${colorClass}">${pos}</span>`;
        }

        function getCategoryBadge(category) {
            const isNAWL = category === "NAWL";
            const classes = isNAWL ? "bg-slate-800 text-white" : "bg-slate-200 text-slate-700";
            return `<span class="px-2 py-0.5 text-[10px] font-bold uppercase tracking-wider rounded-sm inline-block ${classes}">${category}</span>`;
        }

        function getFilteredWords() {
            return state.vocabData.filter(word => {
                const searchLower = state.searchQuery.toLowerCase();
                const matchesSearch = word.word.toLowerCase().includes(searchLower) || word.def.toLowerCase().includes(searchLower);
                const matchesUnit = state.selectedUnit === 'All' || word.unit === state.selectedUnit;
                return matchesSearch && matchesUnit;
            });
        }

        // --- GLOBAL ACTIONS ---
        window.toggleMobileMenu = (open) => { state.isMobileMenuOpen = open; render(); }
        window.setSearchQuery = (val) => { state.searchQuery = val; render(); }
        window.setSelectedUnit = (unit) => { 
            state.selectedUnit = unit; 
            state.isMobileMenuOpen = false; 
            state.savedScrollPos = 0; 
            render(); 
        }
        window.setViewMode = (mode) => {
            const scrollEl = document.getElementById('scroll-container');
            if (scrollEl && !state.selectedWordId) state.savedScrollPos = scrollEl.scrollTop;
            state.viewMode = mode;
            render();
        }
        window.toggleLearned = (id, event) => {
            if (event) event.stopPropagation();
            const scrollEl = document.getElementById('scroll-container');
            const currentScroll = scrollEl ? scrollEl.scrollTop : state.savedScrollPos;
            if (state.learnedWords.has(id)) state.learnedWords.delete(id);
            else state.learnedWords.add(id);
            saveProgress();
            render();
            const newScrollEl = document.getElementById('scroll-container');
            if (newScrollEl && !state.selectedWordId) newScrollEl.scrollTop = currentScroll;
        }
        window.openWordDetail = (id) => {
            const scrollEl = document.getElementById('scroll-container');
            if (scrollEl) state.savedScrollPos = scrollEl.scrollTop;
            state.selectedWordId = id;
            render();
        }
        window.closeWordDetail = () => {
            state.selectedWordId = null;
            render();
            setTimeout(() => {
                const scrollEl = document.getElementById('scroll-container');
                if (scrollEl) scrollEl.scrollTop = state.savedScrollPos;
            }, 0);
        }
        window.navigateDetail = (direction) => {
            const filtered = getFilteredWords();
            const currentIndex = filtered.findIndex(w => w.id === state.selectedWordId);
            if (direction === 'next' && currentIndex < filtered.length - 1) state.selectedWordId = filtered[currentIndex + 1].id;
            else if (direction === 'prev' && currentIndex > 0) state.selectedWordId = filtered[currentIndex - 1].id;
            render();
        }

        window.addEventListener('keydown', (e) => {
            if (!state.selectedWordId) return;
            if (e.key === 'Escape') closeWordDetail();
            if (e.key === 'ArrowRight') navigateDetail('next');
            if (e.key === 'ArrowLeft') navigateDetail('prev');
        });

        // --- RENDER LOGIC ---
        function renderSidebar() {
            const progressPercentage = Math.round((state.learnedWords.size / state.vocabData.length) * 100) || 0;
            const overlay = state.isMobileMenuOpen ? `<div class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-40 md:hidden transition-opacity" onclick="toggleMobileMenu(false)"></div>` : '';
            const sidebarClasses = state.isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full';

            const unitsHtml = state.units.map(unit => {
                const count = unit === 'All' ? state.vocabData.length : state.vocabData.filter(w => w.unit === unit).length;
                const isSelected = state.selectedUnit === unit;
                return `
                    <button onclick="setSelectedUnit('${unit}')" class="w-full flex items-center justify-between px-3 py-2 text-sm rounded-md transition-colors ${isSelected ? 'bg-indigo-50 text-indigo-700 font-medium' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}">
                        <span class="truncate pr-2 text-left">${unit}</span>
                        <span class="text-xs ${isSelected ? 'text-indigo-400' : 'text-slate-400'}">${count}</span>
                    </button>
                `;
            }).join('');

            return `
                ${overlay}
                <aside class="fixed md:relative z-50 w-[280px] md:w-72 bg-white border-r border-slate-200 flex flex-col h-full shrink-0 shadow-2xl md:shadow-none transition-transform duration-300 ease-in-out ${sidebarClasses} md:translate-x-0">
                    <div class="p-6 border-b border-slate-100">
                        <div class="flex items-center justify-between mb-6">
                            <div class="flex items-center gap-2">
                                <i data-lucide="book-open" class="text-indigo-600"></i>
                                <h1 class="text-xl font-bold tracking-tight text-slate-900">Vocab Mastery</h1>
                            </div>
                            <button class="md:hidden p-2 -mr-2 text-slate-500 hover:text-slate-900 rounded-lg" onclick="toggleMobileMenu(false)">
                                <i data-lucide="x" class="w-5 h-5"></i>
                            </button>
                        </div>
                        <div class="space-y-2">
                            <div class="flex justify-between text-xs font-medium text-slate-500"><span>Progress</span><span>${state.learnedWords.size}/${state.vocabData.length}</span></div>
                            <div class="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                                <div class="h-full bg-indigo-500 transition-all duration-500" style="width: ${progressPercentage}%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="p-4 flex-1 overflow-y-auto space-y-6">
                        <div class="relative">
                            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                            <input type="text" placeholder="Search..." value="${state.searchQuery}" oninput="setSearchQuery(this.value)" class="w-full pl-9 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all">
                        </div>
                        <div class="space-y-1">${unitsHtml}</div>
                    </div>
                </aside>
            `;
        }

        function renderDirectory(filteredWords) {
            if (filteredWords.length === 0) return `<div class="h-full flex flex-col items-center justify-center text-slate-400 fade-in"><i data-lucide="search" class="w-12 h-12 mb-4 opacity-20"></i><p>No results found.</p></div>`;

            let contentHtml = '';
            if (state.viewMode === 'grid') {
                contentHtml = `<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 auto-rows-max pb-12 fade-in">` + filteredWords.map(word => {
                    const isLearned = state.learnedWords.has(word.id);
                    return `
                        <div onclick="openWordDetail(${word.id})" class="group relative border rounded-xl p-5 cursor-pointer transition-all hover:shadow-md hover:-translate-y-0.5 ${isLearned ? 'border-emerald-200 bg-emerald-50/10' : 'border-slate-200 bg-white hover:border-indigo-300'}">
                            <div class="flex justify-between items-start mb-3">
                                ${getCategoryBadge(word.category)}
                                <button onclick="toggleLearned(${word.id}, event)" class="p-2 -m-2 hover:scale-110 transition-transform">${isLearned ? svgCheckCircle(24, "text-emerald-500 fill-emerald-100") : svgCircle(24, "text-slate-300")}</button>
                            </div>
                            <h3 class="text-xl font-bold text-slate-900 tracking-tight group-hover:text-indigo-600 transition-colors">${word.word}</h3>
                            <div class="mt-1">${getPosBadge(word.pos)}</div>
                            <p class="text-slate-600 text-sm leading-relaxed line-clamp-2 mt-2">${word.def}</p>
                            <div class="mt-4 text-[10px] font-medium text-slate-400 uppercase tracking-wide">${word.unit}</div>
                        </div>
                    `;
                }).join('') + `</div>`;
            } else if (state.viewMode === 'table') {
                const rows = filteredWords.map(word => `
                    <tr onclick="openWordDetail(${word.id})" class="hover:bg-slate-50 cursor-pointer transition-colors group">
                        <td class="px-4 py-3 text-center" onclick="event.stopPropagation()"><button onclick="toggleLearned(${word.id}, event)" class="p-2 -m-2">${state.learnedWords.has(word.id) ? svgCheckCircle(18, "text-emerald-500 mx-auto") : svgCircle(18, "text-slate-300 mx-auto")}</button></td>
                        <td class="px-4 py-3 font-semibold text-slate-900">${word.word}</td>
                        <td class="px-4 py-3 hidden sm:table-cell">${getPosBadge(word.pos)}</td>
                        <td class="px-4 py-3 text-slate-600 text-sm truncate max-w-xs">${word.def}</td>
                        <td class="px-4 py-3 hidden md:table-cell text-slate-400 text-xs">${word.unit}</td>
                    </tr>
                `).join('');
                contentHtml = `<div class="bg-white border rounded-xl overflow-x-auto shadow-sm pb-12 fade-in"><table class="w-full text-left text-sm min-w-[500px]"><thead class="bg-slate-50 border-b text-slate-500 font-medium"><tr><th class="px-4 py-3 w-12"></th><th class="px-4 py-3">Word</th><th class="px-4 py-3 hidden sm:table-cell">POS</th><th class="px-4 py-3">Definition</th><th class="px-4 py-3 hidden md:table-cell">Unit</th></tr></thead><tbody>${rows}</tbody></table></div>`;
            } else {
                contentHtml = `<div class="max-w-3xl mx-auto space-y-2 pb-12 fade-in">` + filteredWords.map(word => `
                    <div onclick="openWordDetail(${word.id})" class="flex items-center gap-4 py-3 px-4 hover:bg-white hover:shadow-sm border border-transparent hover:border-slate-200 rounded-lg cursor-pointer transition-all">
                        <button onclick="toggleLearned(${word.id}, event)" class="shrink-0 p-2 -m-2">${state.learnedWords.has(word.id) ? svgCheckCircle(18, "text-emerald-500") : svgCircle(18, "text-slate-300")}</button>
                        <span class="font-bold text-slate-900 w-32 truncate">${word.word}</span>
                        <span class="text-slate-600 text-sm truncate flex-1">${word.def}</span>
                    </div>
                `).join('') + `</div>`;
            }

            return `<div id="scroll-container" class="flex-1 overflow-y-auto p-4 md:p-6 bg-slate-50/50">${contentHtml}</div>`;
        }

        function renderWordDetail(word, filteredWords) {
            const isLearned = state.learnedWords.has(word.id);
            const currentIndex = filteredWords.findIndex(w => w.id === word.id);
            return `
                <div id="detail-view-container" class="flex flex-col h-full bg-white slide-in-right touch-pan-y w-full">
                    <header class="px-4 md:px-6 py-4 border-b flex items-center justify-between sticky top-0 bg-white/90 backdrop-blur z-10">
                        <button onclick="closeWordDetail()" class="flex items-center gap-2 text-sm font-medium text-slate-500 hover:text-slate-900 bg-slate-100 px-3 py-1.5 rounded-lg transition-colors">
                            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to List
                        </button>
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-medium text-slate-400 mr-2">${currentIndex+1}/${filteredWords.length}</span>
                            <button onclick="navigateDetail('prev')" ${currentIndex===0?'disabled':''} class="p-2 border rounded-lg hover:bg-slate-50 disabled:opacity-30"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                            <button onclick="navigateDetail('next')" ${currentIndex===filteredWords.length-1?'disabled':''} class="p-2 border rounded-lg hover:bg-slate-50 disabled:opacity-30"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                        </div>
                    </header>
                    <div class="flex-1 overflow-y-auto">
                        <div class="max-w-4xl mx-auto px-6 py-12 md:py-20 flex flex-col items-center text-center">
                            <div class="mb-4 flex gap-2">${getCategoryBadge(word.category)} ${getPosBadge(word.pos)}</div>
                            <h1 class="text-5xl md:text-7xl font-black text-slate-900 tracking-tight mb-8">${word.word}</h1>
                            <div class="w-full max-w-2xl bg-slate-50 rounded-2xl p-8 border shadow-inner mb-12">
                                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4">Definition</h3>
                                <p class="text-2xl md:text-3xl text-slate-800 font-medium leading-relaxed">${word.def}</p>
                            </div>
                            <button onclick="toggleLearned(${word.id})" class="flex items-center gap-3 px-8 py-4 rounded-2xl text-lg font-bold transition-all border-2 ${isLearned?'bg-emerald-50 text-emerald-700 border-emerald-500':'bg-white text-slate-700 border-slate-200'}">
                                ${isLearned?svgCheckCircle(24, "text-emerald-600 fill-emerald-100"):svgCircle(24, "text-slate-300")}
                                <span>${isLearned?'Mastered':'Mark as Mastered'}</span>
                            </button>
                            <p class="text-slate-400 text-xs mt-12 sm:hidden flex items-center gap-2"><i data-lucide="chevron-left" class="w-4 h-4"></i> Swipe to navigate <i data-lucide="chevron-right" class="w-4 h-4"></i></p>
                        </div>
                    </div>
                </div>
            `;
        }

        function render() {
            if (state.isLoading) return;
            const appDiv = document.getElementById('app');
            const filteredWords = getFilteredWords();
            let html = renderSidebar();
            
            if (state.selectedWordId) {
                const word = state.vocabData.find(w => w.id === state.selectedWordId);
                html += `<main class="flex-1 flex flex-col h-full overflow-hidden relative">${renderWordDetail(word, filteredWords)}</main>`;
            } else {
                html += `
                    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
                        <header class="bg-white/80 backdrop-blur-md border-b px-4 py-4 flex items-center justify-between sticky top-0 z-10">
                            <div class="flex items-center gap-3">
                                <button class="md:hidden p-2 -ml-2" onclick="toggleMobileMenu(true)"><i data-lucide="menu"></i></button>
                                <h2 class="text-lg font-semibold truncate max-w-[140px] sm:max-w-none">${state.selectedUnit}</h2>
                            </div>
                            <div class="flex bg-slate-100 p-1 rounded-lg border">
                                <button onclick="setViewMode('grid')" class="p-1.5 rounded ${state.viewMode==='grid'?'bg-white text-indigo-600 shadow-sm':'text-slate-500'}"><i data-lucide="layout-grid" class="w-4 h-4"></i></button>
                                <button onclick="setViewMode('table')" class="p-1.5 rounded ${state.viewMode==='table'?'bg-white text-indigo-600 shadow-sm':'text-slate-500'}"><i data-lucide="list" class="w-4 h-4"></i></button>
                                <button onclick="setViewMode('compact')" class="p-1.5 rounded ${state.viewMode==='compact'?'bg-white text-indigo-600 shadow-sm':'text-slate-500'}"><i data-lucide="align-justify" class="w-4 h-4"></i></button>
                            </div>
                        </header>
                        ${renderDirectory(filteredWords)}
                    </main>`;
            }
            appDiv.innerHTML = html;
            lucide.createIcons();
            if (state.selectedWordId) {
                const container = document.getElementById('detail-view-container');
                let touchStartX = 0;
                container.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].clientX; }, {passive: true});
                container.addEventListener('touchend', e => {
                    const distance = touchStartX - e.changedTouches[0].clientX;
                    if (distance > 60) navigateDetail('next');
                    if (distance < -60) navigateDetail('prev');
                }, {passive: true});
            }
        }

        initData();
    </script>
</body>
</html>
